<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hind',sans-serif;background:linear-gradient(135deg,#FFF8F2,#FFFDF0);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
h1{font-family:'Poppins',sans-serif}
.lock-box{background:#fff;border-radius:18px;box-shadow:0 12px 40px rgba(0,0,0,.1);padding:38px 32px;max-width:380px;width:100%;text-align:center;border:1px solid #E8EAF0}
.lock-icon{font-size:42px;margin-bottom:10px}
h1{font-size:20px;color:#1A1A2E;margin-bottom:6px}
p.sub{color:#999;font-size:13px;margin-bottom:24px}
input[type=password]{width:100%;padding:13px 16px;border:2px solid #E8EAF0;border-radius:10px;font-size:15px;margin-bottom:14px;text-align:center;letter-spacing:2px}
input[type=password]:focus{outline:none;border-color:#FF6B00}
button{width:100%;padding:13px;background:#FF6B00;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;transition:all .2s}
button:hover{background:#E05500}
button:disabled{opacity:.6;cursor:default}
.msg{margin-top:14px;font-size:13px;min-height:18px}
.msg.err{color:#e53935}
.msg.ok{color:#2e7d32}
</style>

function b64ToBytes(b64){
  var bin = atob(b64);
  var bytes = new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++){ bytes[i] = bin.charCodeAt(i); }
  return bytes;
}

async function tryUnlock(){
  var pwEl = document.getElementById('pw');
  var msgEl = document.getElementById('msg');
  var btn = document.getElementById('unlockBtn');
  var pw = pwEl.value;
  if(!pw){ msgEl.className='msg err'; msgEl.textContent='Password डालें'; return; }
  btn.disabled = true;
  msgEl.className = 'msg'; msgEl.textContent = 'खुल रहा है...';
  try{
    var enc = new TextEncoder();
    var salt = b64ToBytes(SALT_B64);
    var iv = b64ToBytes(IV_B64);
    var data = b64ToBytes(DATA_B64);

    var baseKey = await crypto.subtle.importKey('raw', enc.encode(pw), {name:'PBKDF2'}, false, ['deriveKey']);
    var aesKey = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt: salt, iterations: ITER, hash:'SHA-256' },
      baseKey,
      { name:'AES-GCM', length:256 },
      false,
      ['decrypt']
    );
    var decrypted = await crypto.subtle.decrypt({ name:'AES-GCM', iv: iv }, aesKey, data);
    var text = new TextDecoder().decode(decrypted);
    document.open();
    document.write(text);
    document.close();
  }catch(e){
    msgEl.className = 'msg err';
    msgEl.textContent = '❌ गलत Password, दोबारा कोशिश करें';
    btn.disabled = false;
  }
}

document.getElementById('unlockBtn').addEventListener('click', tryUnlock);
document.getElementById('pw').addEventListener('keydown', function(e){ if(e.key==='Enter'){ tryUnlock(); } });
</script>
