name: Post daily quiz to Telegram

on:
  push:
    branches: [main]
    paths:
      - "quiz-data/*.json"
  workflow_dispatch: {}

jobs:
  post-quiz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install requests

      - name: Post quiz polls to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "@omkarsirofficial"
        run: |
          python3 automation/post_daily_quiz_to_telegram.py
