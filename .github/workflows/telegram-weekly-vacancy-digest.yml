name: Post weekly vacancy digest to Telegram

on:
  schedule:
    # 12:30 UTC every Sunday = 6:00 PM IST (Sunday evening)
    - cron: "30 12 * * 0"
  workflow_dispatch: {}

jobs:
  post-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install beautifulsoup4 requests

      - name: Build digest and post to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "@omkarsirofficial"
        run: |
          python3 automation/post_weekly_vacancy_digest.py
