*{margin:0;padding:0;box-sizing:border-box}

.page-hero{background:linear-gradient(135deg,#FFF8F2,#FFFDF0);padding:46px 6% 38px;border-bottom:1px solid #FFE0C0;text-align:center}
.page-hero h1{font-size:clamp(24px,4vw,36px);font-weight:800;margin-bottom:8px}

.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}
.note-card{background:#fff;border:2px solid #E8EAF0;border-radius:14px;padding:18px 20px;display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;transition:all .2s}

.note-info{flex:1;min-width:0}

.note-date{font-size:12px;color:#999;margin-top:4px}
.note-arrow{color:#FF6B00;font-size:18px;flex-shrink:0}
.back-link{display:block;text-align:center;margin-top:36px}
.back-link a{color:#FF6B00;text-decoration:none;font-weight:700;font-size:14px}

.footer-logo{font-family:'Poppins',sans-serif;font-size:20px;font-weight:800;color:white;margin-bottom:6px}
.footer-logo span{color:#FF6B00}

<script src="/nied-menu.js" defer></script>
<script>
function esc(s){
  var d = document.createElement('div');
  d.textContent = (s===null||s===undefined) ? '' : String(s);
  return d.innerHTML;
}
function fmtDate(iso){
  try{
    var d = new Date(iso);
    var months = ['जन','फ़र','मार्च','अप्रैल','मई','जून','जुल','अग','सित','अक्तू','नव','दिस'];
    return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
  }catch(e){ return ''; }
}
fetch('/posts.json', {cache:'no-store'})
  .then(function(r){ return r.json(); })
  .then(function(data){
    var posts = data.posts || [];
    document.getElementById('notesCount').textContent = 'कुल ' + posts.length + ' पोस्ट';
    var grid = document.getElementById('notesGrid');
    var html = '';
    posts.forEach(function(p){
      html += '<a class="note-card" href="' + esc(p.url) + '">'
        + '<span class="note-icon">' + esc(p.icon || '📄') + '</span>'
        + '<div class="note-info"><div class="note-title">' + esc(p.title) + '</div>'
        + '<div class="note-date">' + esc(fmtDate(p.date)) + '</div></div>'
        + '<span class="note-arrow">→</span></a>';
    });
    grid.innerHTML = html;
  })
  .catch(function(err){
    document.getElementById('notesCount').textContent = 'Posts load नहीं हो पाए।';
    console.error('all-notes error:', err);
  });
</script>
